<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Nexus Math</title>
  <meta name="description" content="Nexus Math — grade-based practice with quick questions and a Boss challenge." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght,SOFT@9..144,500..800,50&display=swap" rel="stylesheet">

  <style>
    /* (Same CSS as before, omitted here for brevity; use the full CSS from previous code) */
    :root{
      --bg0:#070A10;
      --bg1:#0B1020;

      --ink:#EAF0FF;
      --muted:#AAB4D6;
      --faint: rgba(234,240,255,.12);

      --mint:#4FF0C8;
      --cobalt:#4C6FFF;
      --violet:#A76BFF;
      --amber:#FFCA66;
      --rose:#FF5EA8;

      --shadow: 0 22px 60px rgba(0,0,0,.55);
      --shadow2: 0 14px 30px rgba(0,0,0,.35);

      --r-xl: 28px;
      --r-lg: 22px;
      --r-md: 16px;

      --maxw: 1160px;
      --ease: cubic-bezier(.2,.85,.15,1);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--ink);
      background:
        radial-gradient(1200px 700px at 18% 10%, rgba(79,240,200,.20), transparent 55%),
        radial-gradient(900px 600px at 88% 18%, rgba(76,111,255,.18), transparent 55%),
        radial-gradient(1100px 900px at 65% 90%, rgba(167,107,255,.14), transparent 60%),
        radial-gradient(700px 500px at 40% 70%, rgba(255,202,102,.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: "Space Grotesk", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      letter-spacing:.2px;
      overflow-x:hidden;
    }
    a{ color:inherit; text-decoration:none; }
    button, input, textarea{ font:inherit; color:inherit; }

    .btn{
      border:0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 800;
      letter-spacing: .2px;
      cursor:pointer;
      transition: transform .18s var(--ease), filter .18s var(--ease), background .25s var(--ease), box-shadow .25s var(--ease), border-color .25s var(--ease);
      user-select:none;
      position:relative;
      isolation:isolate;
      white-space:nowrap;
      background: linear-gradient(135deg, rgba(79,240,200,.95), rgba(76,111,255,.92));
      color: #061019;
      box-shadow: 0 16px 34px rgba(79,240,200,.14), 0 18px 40px rgba(76,111,255,.16);
      margin-top: 10px;
    }
    .btn:hover{ transform: translateY(-1px); filter:saturate(1.05) contrast(1.02); }
    .btn:active{ transform: translateY(1px) scale(.99); }

    .grade-btn{
      border-radius: 999px;
      border: 1px solid rgba(234,240,255,.12);
      background: rgba(234,240,255,.06);
      color: rgba(234,240,255,.92);
      padding: 10px 12px;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: .2px;
      cursor:pointer;
      transition: transform .18s var(--ease), background .25s var(--ease), border-color .25s var(--ease), box-shadow .25s var(--ease);
      user-select:none;
      white-space:nowrap;
      margin: 4px;
    }
    .grade-btn:hover{
      background: rgba(79,240,200,.15);
      border-color: rgba(79,240,200,.35);
      box-shadow: 0 0 8px rgba(79,240,200,.45);
      transform: translateY(-1px);
    }
    .grade-btn:active{
      transform: translateY(1px);
      box-shadow:none;
    }

    .output {
      margin-top: 20px;
      font-size: 18px;
      color: var(--mint);
      min-height: 60px;
    }

    input.answer-input {
      margin-top: 10px;
      padding: 8px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      outline: none;
      width: 100px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav" style="max-width: var(--maxw); margin:0 auto; padding: 14px 18px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;">
      <div class="brand" style="display:flex; align-items:center; gap:12px; min-width: 180px;">
        <div class="mark" style="width:38px; height:38px; border-radius: 14px; background: radial-gradient(14px 14px at 30% 30%, rgba(255,255,255,.65), transparent 55%), conic-gradient(from 210deg, var(--mint), var(--cobalt), var(--violet), var(--mint)); box-shadow: 0 14px 28px rgba(79,240,200,.10), 0 14px 28px rgba(76,111,255,.12); position:relative; overflow:hidden;"></div>
        <div>
          <h1 style="margin:0; font-family:'Fraunces', serif; font-weight: 780; letter-spacing: .2px; font-size: 18px; line-height:1;">Nexus Math</h1>
          <small style="display:block; margin-top:2px; color: var(--muted); font-size: 12px; letter-spacing: .6px; text-transform: uppercase;">Practice & Challenge</small>
        </div>
      </div>
    </nav>
  </header>

  <main class="wrap" style="max-width: var(--maxw); margin:0 auto; padding: 18px 18px 70px;">
    <section class="hero" style="display:grid; grid-template-columns: 1.1fr .9fr; gap: 26px; align-items:start; padding: 26px 0 10px;">
      <div>
        <h2 style="margin:0; font-family:'Fraunces', serif; font-weight: 800; font-size: clamp(34px, 4.2vw, 58px); line-height: 1.02; letter-spacing: -0.6px;">Welcome to <span class="accent" style="background: linear-gradient(90deg, var(--mint), var(--cobalt), var(--violet)); -webkit-background-clip:text; background-clip:text; color:transparent;">Nexus Math</span></h2>
        <p class="lead" style="margin: 12px 0 18px; color: rgba(234,240,255,.82); font-size: 16px; line-height: 1.6; max-width: 60ch;">Choose your grade below to start practicing quick math questions or take the Boss challenge!</p>
      </div>
      <div class="grade-shell" style="margin-top: 18px; padding: 14px; border-radius: var(--r-xl); border: 1px solid rgba(234,240,255,.12); background: linear-gradient(180deg, rgba(12,16,32,.55), rgba(12,16,32,.30)); box-shadow: var(--shadow2); overflow:hidden; position:relative;">
        <div class="grade-inner" style="position:relative; z-index:1;">
          <div class="grade-head" style="display:flex; align-items:flex-end; justify-content:space-between; gap:14px; padding: 6px 4px 10px;">
            <h3 style="margin:0; font-size: 14px; letter-spacing: .6px; text-transform: uppercase; color: rgba(234,240,255,.78);">Select Grade</h3>
            <div class="current" style="color: var(--muted); font-size: 13px;">Current: <strong>None</strong></div>
          </div>
          <div class="grade-row" style="display:flex; flex-wrap:wrap; gap: 10px; padding: 10px; border-radius: var(--r-lg); background: rgba(7,10,16,.32); border: 1px solid rgba(234,240,255,.10);">
            <button class="grade-btn" data-grade="1">Grade 1</button>
            <button class="grade-btn" data-grade="2">Grade 2</button>
            <button class="grade-btn" data-grade="3">Grade 3</button>
            <button class="grade-btn" data-grade="4">Grade 4</button>
            <button class="grade-btn" data-grade="5">Grade 5</button>
          </div>
        </div>
      </div>
      <div style="margin-top: 20px;">
        <button class="btn btn-boss" id="bossChallengeBtn" style="background: radial-gradient(120px 60px at 18% 24%, rgba(255,255,255,.30), transparent 65%), linear-gradient(135deg, rgba(255,94,168,.92), rgba(167,107,255,.92), rgba(76,111,255,.92)); color: #0A0712; box-shadow: 0 18px 44px rgba(255,94,168,.14), 0 18px 44px rgba(167,107,255,.14), 0 18px 44px rgba(76,111,255,.14); border: 1px solid rgba(255,255,255,.14); border-radius: 999px; padding: 10px 14px; font-weight: 800; letter-spacing: .2px; cursor:pointer; user-select:none; white-space:nowrap;">Boss Challenge</button>
      </div>
      <div class="output" id="output"></div>
    </section>
  </main>

  <script>
    // Practice questions for each grade
    const practiceQuestions = {
      1: { question: "What is 2 + 3?", answer: "5" },
      2: { question: "What is 7 - 4?", answer: "3" },
      3: { question: "What is 6 × 3?", answer: "18" },
      4: { question: "What is 12 ÷ 4?", answer: "3" },
      5: { question: "What is 15 + 27?", answer: "42" }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const gradeButtons = document.querySelectorAll('.grade-btn');
      const currentDisplay = document.querySelector('.grade-head .current strong');
      const output = document.getElementById('output');
      const bossBtn = document.getElementById('bossChallengeBtn');

      function showPractice(grade) {
        const practice = practiceQuestions[grade];
        if (!practice) {
          output.innerHTML = "No practice available for this grade.";
          return;
        }
        output.innerHTML = `
          <div><strong>Question:</strong> ${practice.question}</div>
          <input type="text" id="answerInput" class="answer-input" placeholder="Your answer" />
          <button class="btn" id="checkAnswerBtn">Check Answer</button>
          <div id="feedback" style="margin-top:10px;"></div>
        `;

        const checkBtn = document.getElementById('checkAnswerBtn');
        const answerInput = document.getElementById('answerInput');
        const feedback = document.getElementById('feedback');

        checkBtn.addEventListener('click', () => {
          const userAnswer = answerInput.value.trim();
          if (userAnswer === "") {
            feedback.textContent = "Please enter an answer.";
            feedback.style.color = "orange";
            return;
          }
          if (userAnswer === practice.answer) {
            feedback.textContent = "Correct! Great job!";
            feedback.style.color = "limegreen";
          } else {
            feedback.textContent = `Oops! The correct answer is ${practice.answer}.`;
            feedback.style.color = "tomato";
          }
        });
      }

      gradeButtons.forEach(button => {
        button.addEventListener('click', () => {
          const grade = button.getAttribute('data-grade');
          currentDisplay.textContent = `Grade ${grade}`;
          showPractice(grade);
        });
      });

      bossBtn.addEventListener('click', () => {
        currentDisplay.textContent = 'Boss Challenge';
        output.innerHTML = `
          <div><strong>Boss Challenge:</strong> Solve this!</div>
          <div style="margin-top:10px; font-size: 20px;">What is 25 × 4 + 100 ÷ 5?</div>
          <input type="text" id="bossAnswerInput" class="answer-input" placeholder="Your answer" />
          <button class="btn" id="checkBossAnswerBtn">Check Answer</button>
          <div id="bossFeedback" style="margin-top:10px;"></div>
        `;

        const checkBossBtn = document.getElementById('checkBossAnswerBtn');
        const bossAnswerInput = document.getElementById('bossAnswerInput');
        const bossFeedback = document.getElementById('bossFeedback');

        checkBossBtn.addEventListener('click', () => {
          const userAnswer = bossAnswerInput.value.trim();
          if (userAnswer === "") {
            bossFeedback.textContent = "Please enter an answer.";
            bossFeedback.style.color = "orange";
            return;
          }
          if (userAnswer === "105") {
            bossFeedback.textContent = "Correct! You are a Boss!";
            bossFeedback.style.color = "limegreen";
          } else {
            bossFeedback.textContent = "Wrong! Try again.";
            bossFeedback.style.color = "tomato";
          }
        });
      });
    });
  </script>
</body>
</html>
